<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StockFlow — Smart Inventory Management System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f6fa;
      --surface: #ffffff;
      --surface-2: #f0f2f8;
      --sidebar: #0f172a;
      --sidebar-text: #94a3b8;
      --sidebar-active: #ffffff;
      --sidebar-active-bg: #1e40af;
      --accent: #2563eb;
      --accent-light: #dbeafe;
      --accent-dark: #1d4ed8;
      --success: #10b981;
      --success-light: #d1fae5;
      --warning: #f59e0b;
      --warning-light: #fef3c7;
      --danger: #ef4444;
      --danger-light: #fee2e2;
      --purple: #8b5cf6;
      --purple-light: #ede9fe;
      --text-primary: #0f172a;
      --text-secondary: #64748b;
      --text-muted: #94a3b8;
      --border: #e2e8f0;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow: 0 4px 6px -1px rgba(0,0,0,0.08), 0 2px 4px -1px rgba(0,0,0,0.04);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -2px rgba(0,0,0,0.04);
      --radius: 12px;
      --radius-sm: 8px;
      --radius-lg: 16px;
      --sidebar-width: 248px;
      --font: 'DM Sans', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    html, body, #root { height: 100%; font-family: var(--font); background: var(--bg); color: var(--text-primary); }
    body { line-height: 1.5; -webkit-font-smoothing: antialiased; }
    * { scrollbar-width: thin; scrollbar-color: #cbd5e1 transparent; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }

    /* Layout */
    .app-layout { display: flex; height: 100vh; overflow: hidden; }
    .sidebar {
      width: var(--sidebar-width); flex-shrink: 0;
      background: var(--sidebar); display: flex; flex-direction: column;
      padding: 0; overflow-y: auto; transition: width .2s ease; z-index: 100;
    }
    .sidebar-brand {
      padding: 24px 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .brand-logo {
      display: flex; align-items: center; gap: 10px;
    }
    .brand-icon {
      width: 36px; height: 36px; background: var(--accent);
      border-radius: 10px; display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .brand-name { font-size: 17px; font-weight: 700; color: #fff; letter-spacing: -.3px; }
    .brand-sub { font-size: 11px; color: var(--sidebar-text); font-weight: 400; }
    .sidebar-section { padding: 20px 12px 8px; }
    .sidebar-section-label {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 1px; color: #475569; padding: 0 8px; margin-bottom: 6px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; border-radius: var(--radius-sm); cursor: pointer;
      color: var(--sidebar-text); font-size: 13.5px; font-weight: 500;
      transition: all .15s ease; margin-bottom: 2px; border: none; background: none;
      width: 100%; text-align: left;
    }
    .nav-item:hover { background: rgba(255,255,255,0.05); color: #e2e8f0; }
    .nav-item.active { background: var(--sidebar-active-bg); color: var(--sidebar-active); }
    .nav-item .nav-icon { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }
    .nav-badge {
      margin-left: auto; background: var(--danger); color: white;
      font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px;
    }
    .sidebar-footer {
      margin-top: auto; padding: 16px 12px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    /* Main content */
    .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .topbar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 28px; height: 60px; display: flex; align-items: center;
      justify-content: space-between; flex-shrink: 0;
    }
    .topbar-title { font-size: 18px; font-weight: 700; color: var(--text-primary); }
    .topbar-subtitle { font-size: 12px; color: var(--text-secondary); }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .topbar-badge {
      background: var(--accent-light); color: var(--accent);
      font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 20px;
    }
    .page-content { flex: 1; overflow-y: auto; padding: 24px 28px; }

    /* Cards */
    .card {
      background: var(--surface); border-radius: var(--radius);
      border: 1px solid var(--border); padding: 20px;
      box-shadow: var(--shadow-sm);
    }
    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .card-title { font-size: 14px; font-weight: 600; color: var(--text-primary); }
    .card-subtitle { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

    /* KPI Cards */
    .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .kpi-card {
      background: var(--surface); border-radius: var(--radius);
      border: 1px solid var(--border); padding: 20px 24px;
      box-shadow: var(--shadow-sm); position: relative; overflow: hidden;
    }
    .kpi-card::after {
      content: ''; position: absolute; right: -20px; top: -20px;
      width: 80px; height: 80px; border-radius: 50%;
      background: currentColor; opacity: .06;
    }
    .kpi-icon {
      width: 42px; height: 42px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; margin-bottom: 14px;
    }
    .kpi-value { font-size: 26px; font-weight: 700; color: var(--text-primary); line-height: 1; }
    .kpi-label { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
    .kpi-change { font-size: 12px; font-weight: 600; margin-top: 8px; display: flex; align-items: center; gap: 4px; }
    .kpi-change.up { color: var(--success); }
    .kpi-change.down { color: var(--danger); }

    /* Grid layouts */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .col-span-2 { grid-column: span 2; }

    /* Table */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
    th { padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: var(--text-muted); border-bottom: 1px solid var(--border); white-space: nowrap; }
    td { padding: 12px 14px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8faff; }
    .td-name { font-weight: 600; color: var(--text-primary); }
    .td-mono { font-family: var(--font-mono); font-size: 12px; color: var(--text-secondary); }

    /* Badges */
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px;
    }
    .badge-success { background: var(--success-light); color: #065f46; }
    .badge-warning { background: var(--warning-light); color: #92400e; }
    .badge-danger { background: var(--danger-light); color: #991b1b; }
    .badge-info { background: var(--accent-light); color: #1e40af; }
    .badge-purple { background: var(--purple-light); color: #5b21b6; }
    .badge-neutral { background: var(--surface-2); color: var(--text-secondary); }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 9px 18px; border-radius: var(--radius-sm); font-size: 13.5px;
      font-weight: 600; cursor: pointer; border: none; transition: all .15s ease;
      font-family: var(--font); white-space: nowrap;
    }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-dark); }
    .btn-secondary { background: var(--surface-2); color: var(--text-primary); }
    .btn-secondary:hover:not(:disabled) { background: var(--border); }
    .btn-success { background: var(--success); color: white; }
    .btn-success:hover:not(:disabled) { background: #059669; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-danger:hover:not(:disabled) { background: #dc2626; }
    .btn-outline { background: transparent; color: var(--accent); border: 1.5px solid var(--accent); }
    .btn-outline:hover:not(:disabled) { background: var(--accent-light); }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn-icon { padding: 8px; }

    /* Form elements */
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 12.5px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }
    .form-control {
      width: 100%; padding: 9px 12px; border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); font-size: 13.5px; font-family: var(--font);
      color: var(--text-primary); background: var(--surface); transition: border-color .15s;
      outline: none;
    }
    .form-control:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
    .form-control::placeholder { color: var(--text-muted); }
    select.form-control { cursor: pointer; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }

    /* Search bar */
    .search-wrap { position: relative; }
    .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 15px; pointer-events: none; }
    .search-input { padding-left: 34px !important; }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      backdrop-filter: blur(4px); z-index: 1000;
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .modal {
      background: var(--surface); border-radius: var(--radius-lg);
      width: 100%; max-width: 640px; max-height: 90vh; overflow-y: auto;
      box-shadow: var(--shadow-lg); animation: modalIn .2s ease;
    }
    .modal-lg { max-width: 820px; }
    .modal-header {
      padding: 22px 24px 18px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--surface); z-index: 1;
    }
    .modal-title { font-size: 16px; font-weight: 700; }
    .modal-body { padding: 22px 24px; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }
    @keyframes modalIn { from { opacity: 0; transform: scale(.95) translateY(10px); } to { opacity: 1; transform: none; } }
    .close-btn { width: 32px; height: 32px; border-radius: 8px; border: none; background: var(--surface-2); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
    .close-btn:hover { background: var(--border); }

    /* Toast notifications */
    .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
    .toast {
      display: flex; align-items: center; gap: 12px;
      background: var(--text-primary); color: white;
      padding: 14px 18px; border-radius: var(--radius); min-width: 300px; max-width: 420px;
      box-shadow: var(--shadow-lg); animation: toastIn .3s ease;
      border-left: 4px solid var(--accent);
    }
    .toast.success { border-left-color: var(--success); }
    .toast.error { border-left-color: var(--danger); }
    .toast.warning { border-left-color: var(--warning); }
    .toast-icon { font-size: 18px; flex-shrink: 0; }
    .toast-msg { font-size: 13.5px; font-weight: 500; flex: 1; }
    .toast-close { opacity: .6; cursor: pointer; font-size: 16px; }
    .toast-close:hover { opacity: 1; }
    @keyframes toastIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: none; } }

    /* Loading */
    .spinner { width: 20px; height: 20px; border: 2.5px solid rgba(255,255,255,.3); border-top-color: white; border-radius: 50%; animation: spin .7s linear infinite; }
    .spinner-dark { border: 2.5px solid var(--border); border-top-color: var(--accent); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-state { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 48px; color: var(--text-secondary); font-size: 14px; }

    /* Stock level bar */
    .stock-bar { height: 5px; background: var(--surface-2); border-radius: 99px; overflow: hidden; }
    .stock-bar-fill { height: 100%; border-radius: 99px; transition: width .4s ease; }

    /* Alert box */
    .alert { padding: 12px 16px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 16px; display: flex; align-items: flex-start; gap: 10px; }
    .alert-warning { background: var(--warning-light); color: #92400e; border: 1px solid #fcd34d; }
    .alert-info { background: var(--accent-light); color: #1e40af; border: 1px solid #93c5fd; }
    .alert-danger { background: var(--danger-light); color: #991b1b; border: 1px solid #fca5a5; }
    .alert-success { background: var(--success-light); color: #065f46; border: 1px solid #6ee7b7; }

    /* Pagination */
    .pagination { display: flex; align-items: center; gap: 6px; justify-content: flex-end; margin-top: 16px; }
    .page-btn { padding: 6px 12px; border-radius: 6px; border: 1.5px solid var(--border); background: var(--surface); font-size: 13px; cursor: pointer; font-family: var(--font); font-weight: 500; }
    .page-btn:hover { border-color: var(--accent); color: var(--accent); }
    .page-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
    .page-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* Empty state */
    .empty-state { text-align: center; padding: 56px 24px; }
    .empty-icon { font-size: 48px; margin-bottom: 14px; }
    .empty-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
    .empty-desc { font-size: 13.5px; color: var(--text-secondary); }

    /* Prediction cards */
    .prediction-card {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); margin-bottom: 10px;
      transition: box-shadow .15s;
    }
    .prediction-card:hover { box-shadow: var(--shadow); }
    .prediction-card.critical { border-color: #fca5a5; background: #fff5f5; }
    .prediction-card.warning { border-color: #fcd34d; background: #fffbf0; }
    .prediction-icon { font-size: 24px; flex-shrink: 0; }
    .prediction-info { flex: 1; }
    .prediction-name { font-weight: 600; font-size: 13.5px; }
    .prediction-msg { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
    .prediction-days { font-size: 22px; font-weight: 700; flex-shrink: 0; text-align: right; }
    .prediction-days-label { font-size: 10px; color: var(--text-muted); }

    /* Invoice */
    .invoice-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
    .invoice-title { font-size: 28px; font-weight: 800; color: var(--accent); }
    .invoice-items-table th { background: var(--bg); }

    /* Chart container */
    .chart-container { position: relative; height: 240px; }

    /* Tabs */
    .tabs { display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 20px; }
    .tab { padding: 10px 18px; font-size: 13.5px; font-weight: 600; color: var(--text-secondary); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all .15s; }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab:hover:not(.active) { color: var(--text-primary); }

    /* Purchase/Sale item row */
    .item-row { display: grid; gap: 10px; align-items: end; margin-bottom: 10px; }
    .item-row-4 { grid-template-columns: 2fr 1fr 1fr 40px; }
    .item-row-5 { grid-template-columns: 2fr 1fr 1fr 1fr 40px; }
    .remove-btn { width: 34px; height: 34px; border-radius: 6px; border: 1.5px solid var(--danger-light); background: var(--danger-light); color: var(--danger); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; align-self: flex-end; }
    .remove-btn:hover { background: var(--danger); color: white; }
    .item-total-row { display: flex; justify-content: flex-end; gap: 20px; padding: 12px 0; border-top: 1px solid var(--border); font-size: 14px; }

    /* Misc */
    .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
    .text-right { text-align: right; }
    .text-center { text-align: center; }
    .flex { display: flex; }
    .flex-1 { flex: 1; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .gap-2 { gap: 8px; }
    .gap-3 { gap: 12px; }
    .mt-1 { margin-top: 4px; }
    .mb-4 { margin-bottom: 16px; }
    .mb-6 { margin-bottom: 24px; }
    .fw-700 { font-weight: 700; }
    .text-sm { font-size: 12px; }
    .text-muted { color: var(--text-secondary); }
    .text-success { color: var(--success); }
    .text-danger { color: var(--danger); }
    .text-warning { color: var(--warning); }
    .text-accent { color: var(--accent); }
    .currency::before { content: '₹'; font-size: .85em; }
    .avatar { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; flex-shrink: 0; }
  </style>
</head>
<body>
<div id="root">
  <div id="app-loader" style="
    display:flex; flex-direction:column; align-items:center;
    justify-content:center; height:100vh; background:#f5f6fa; gap:14px;
  ">
    <div style="
      width:52px; height:52px; background:#2563eb; border-radius:14px;
      display:flex; align-items:center; justify-content:center; font-size:26px;
      box-shadow: 0 8px 24px rgba(37,99,235,0.3);
    ">📦</div>
    <div style="font-size:22px; font-weight:700; color:#0f172a; letter-spacing:-0.5px;">StockFlow</div>
    <div style="font-size:13px; color:#64748b;">Inventory Management</div>
    <div style="
      width:36px; height:36px; margin-top:8px;
      border:3px solid #dbeafe; border-top-color:#2563eb;
      border-radius:50%; animation:spin .8s linear infinite;
    "></div>
  </div>
</div>

<style>
  @keyframes spin { to { transform: rotate(360deg); } }
  /* Hide Babel's own "A" indicator */
  script[type="text/babel"] { display: none !important; }
</style>

<script>
  // Remove loader once React has rendered
  document.addEventListener('DOMContentLoaded', function() {
    var observer = new MutationObserver(function() {
      var loader = document.getElementById('app-loader');
      var root = document.getElementById('root');
      if (loader && root && root.children.length > 1) {
        loader.style.opacity = '0';
        loader.style.transition = 'opacity 0.3s ease';
        setTimeout(function() { loader.remove(); }, 300);
        observer.disconnect();
      }
    });
    observer.observe(document.getElementById('root'), { childList: true, subtree: true });
  });
</script>

<script type="text/babel" src="/static/js/app.js"></script>
</body>
</html>
