services:
  - type: web
    name: stockflow
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        value: sqlite:///instance/grocery_erp.db
    # Persistent disk for SQLite database
    disk:
      name: stockflow-data
      mountPath: /opt/render/project/src/instance
      sizeGB: 1
